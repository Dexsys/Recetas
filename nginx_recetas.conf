# Redirigir HTTP a HTTPS
server {
    listen 80;
    server_name recetas.dexsys.cl;
    return 301 https://$server_name$request_uri;
}

# Servidor HTTPS
server {
    listen 443 ssl http2;
    server_name recetas.dexsys.cl;

    # Certificados SSL (se generarán después)
    ssl_certificate /etc/nginx/ssl/recetas.crt;
    ssl_certificate_key /etc/nginx/ssl/recetas.key;

    # Configuración SSL segura
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Tamaño máximo de archivos (50MB)
    client_max_body_size 50M;

    # Logs
    access_log /var/log/nginx/recetas_access.log;
    error_log /var/log/nginx/recetas_error.log;

    # Proxy a Gunicorn
    location / {
        proxy_pass http://127.0.0.1:5110;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts para uploads largos
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Archivos estáticos (si los hay)
    location /static {
        alias /home/ubuntu/Developer/Flask/Recetas/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Archivos subidos
    location /uploads {
        alias /home/ubuntu/Developer/Flask/Recetas/uploads;
        expires 7d;
        add_header Cache-Control "private";
    }
}
